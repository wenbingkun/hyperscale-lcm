# 全局配置
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ============== Core 服务配置 ==============
core:
  enabled: true
  replicaCount: 2
  
  image:
    repository: example/lcm-core
    tag: "latest"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 9000
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  # 自动扩缩
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  
  # 健康检查
  health:
    liveness:
      path: /health/live
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /health/ready
      initialDelaySeconds: 10
      periodSeconds: 5
  
  # 环境变量
  env:
    QUARKUS_PROFILE: prod
    JAVA_OPTS: "-Xms512m -Xmx2g"

# ============== Frontend 配置 ==============
frontend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: example/lcm-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 80
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  
  # API 代理配置
  apiProxy:
    backend: ""  # Resolved in template as http://{{ .Release.Name }}-core:8080

# ============== Satellite DaemonSet 配置 ==============
satellite:
  enabled: true
  
  image:
    repository: example/lcm-satellite
    tag: "latest"
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Core 服务地址
  core:
    host: ""  # Resolved in template as {{ .Release.Name }}-core
    grpcPort: 9000
  
  # 节点选择器
  nodeSelector: {}

  # 可选环境变量覆盖
  env:
    # LCM_BMC_AUTH_MODE: SESSION_PREFERRED
    # LCM_BMC_SESSION_TTL_SECONDS_MAX: "1800"
  
  # 容忍度 (用于 GPU 节点)
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

# ============== Ingress 配置 ==============
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/websocket-services: ""  # Set in ingress template
  hosts:
    - host: lcm.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: core
        - path: /ws
          pathType: Prefix
          service: core
  tls: []

# ============== 基础设施依赖 ==============
postgresql:
  enabled: true
  auth:
    username: lcm
    password: lcm123
    database: lcm
  primary:
    networkPolicy:
      enabled: true
      allowExternal: false
      allowExternalEgress: true
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: true
    password: redis123
  networkPolicy:
    enabled: true
    allowExternal: false
    allowExternalEgress: true
  master:
    persistence:
      size: 5Gi

kafka:
  enabled: false
  networkPolicy:
    enabled: true
    allowExternal: false
  # 如需启用 Kafka
  # listeners:
  #   client:
  #     protocol: PLAINTEXT

# ============== 监控配置 ==============
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  
  # Grafana Dashboard
  grafana:
    enabled: true
    dashboards:
      - name: hyperscale-lcm

  alertmanager:
    enabled: true
    replicaCount: 1
    image:
      repository: prom/alertmanager
      tag: "v0.28.1"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9093
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    secrets:
      mode: chart-managed     # chart-managed | external
      externalSecretName: ""  # 仅 mode=external 时生效
    receivers:
      email:
        enabled: false
        to: ""
        from: ""
        smarthost: ""
        requireTls: true
      slack:
        enabled: false
        channel: "#alerts"
      pagerduty:
        enabled: false
    route:
      groupWait: 10s
      groupInterval: 5m
      repeatInterval: 3h

# ============== 网络隔离 ==============
networkPolicy:
  enabled: true
  core:
    ingressController:
      enabled: true
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
          app.kubernetes.io/component: controller
    prometheus:
      enabled: true
      namespaceSelector: {}
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
  satellite:
    enabled: true

# ============== 可用性保护 ==============
podDisruptionBudget:
  enabled: true
  core:
    enabled: true
    minAvailable: 1
  satellite:
    enabled: true
    maxUnavailable: 25%

# ============== 身份与权限 ==============
serviceAccount:
  create: true
  automountServiceAccountToken: false
  core:
    name: ""
    annotations: {}
  satellite:
    name: ""
    annotations: {}

rbac:
  create: true
  core:
    enabled: true
  satellite:
    enabled: true

# ============== 安全配置 ==============
security:
  # mTLS 配置
  mtls:
    enabled: false
    secretName: lcm-tls
  
  # JWT 配置
  jwt:
    secret: ""  # 留空则自动生成
    issuer: "hyperscale-lcm"
    expiration: 3600

# ============== 共享配置 ==============
configMap:
  # 应用配置
  LCM_CLUSTER_NAME: "production"
  LCM_LOG_LEVEL: "INFO"

secrets:
  # 敏感配置 (base64 编码)
  adminPassword: ""  # 留空则自动生成
