{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "hyperscale-lcm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyperscale-lcm.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyperscale-lcm.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "hyperscale-lcm.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: frontend
          image: {{ include "hyperscale-lcm.image" .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: API_BACKEND
              value: http://{{ .Release.Name }}-core:{{ .Values.core.service.httpPort }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "hyperscale-lcm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hyperscale-lcm.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
