apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "hyperscale-lcm.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
{{- /* Always create the secret - auto-generate passwords when not provided */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "hyperscale-lcm.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.adminPassword }}
  admin-password: {{ .Values.secrets.adminPassword | b64enc }}
  {{- else }}
  admin-password: {{ randAlphaNum 16 | b64enc }}
  {{- end }}
  {{- if .Values.security.jwt.secret }}
  jwt-secret: {{ .Values.security.jwt.secret | b64enc }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
