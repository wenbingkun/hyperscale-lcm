syntax = "proto3";

package lcm;

option java_multiple_files = true;
option java_package = "com.sc.lcm.core.grpc";
option java_outer_classname = "LcmProto";
option go_package = "github.com/sc-lcm/satellite/pkg/grpc;lcm";

service LcmService {
    // Satellite registers itself to the Core upon startup
    rpc RegisterSatellite (RegisterRequest) returns (RegisterResponse);

    // Periodic heartbeat to keep status online
    rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);

    // Report discovered assets (e.g. from network scan)
    rpc ReportDiscovery (DiscoveryRequest) returns (DiscoveryResponse);

    // Persistent bidirectional stream for command push
    rpc ConnectStream (stream StreamRequest) returns (stream StreamResponse);
}

message RegisterRequest {
    string hostname = 1;
    string ip_address = 2;
    string os_version = 3;
    string agent_version = 4;

    // Hardware specs reported at registration
    HardwareSpecs hardware = 5;
}

// Hardware specification reported by Satellite during registration
message HardwareSpecs {
    int32 cpu_cores = 1;
    int64 memory_gb = 2;
    int32 gpu_count = 3;
    string gpu_model = 4;      // e.g., "A100", "H100", "MI250"
    string gpu_topology = 5;   // NVLink, NVSwitch, PCIe
    int32 nvlink_bandwidth_gbps = 6;
    string rack_id = 7;
    string zone_id = 8;
    string bmc_ip = 9;
    string bmc_mac = 10;
    string system_serial = 11;
    string system_model = 12;
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
    string assigned_id = 3; // Core assigns a unique ID to the satellite
}

message HeartbeatRequest {
    string satellite_id = 1;
    double load_avg = 2; // CPU Load Average (1 min)
    uint64 memory_used_bytes = 3;

    // Extended metrics
    double cpu_usage_percent = 4;    // CPU utilization 0-100
    uint64 memory_total_bytes = 5;   // Total memory
    uint64 disk_used_bytes = 6;      // Disk used
    uint64 disk_total_bytes = 7;     // Disk total
    int32 gpu_count = 8;             // Number of GPUs detected
    repeated GpuMetric gpu_metrics = 9;
    string power_state = 10;                // e.g., "On", "Off" (from Redfish)
    int32 system_temperature_celsius = 11;  // Chassis temperature
}

// Per-GPU metrics
message GpuMetric {
    int32 index = 1;
    string name = 2;                  // e.g., "NVIDIA A100-SXM4-80GB"
    double utilization_percent = 3;   // GPU utilization 0-100
    uint64 memory_used_bytes = 4;     // GPU memory used
    uint64 memory_total_bytes = 5;    // GPU memory total
    int32 temperature_celsius = 6;    // GPU temperature
    int32 power_watts = 7;            // GPU power draw
}

message HeartbeatResponse {
    bool success = 1;
}

message DiscoveryRequest {
    string satellite_id = 1;
    string discovered_ip = 2;
    string mac_address = 3; // Optional
    string discovery_method = 4; // e.g. "PING", "ARP", "DHCP"
}

message DiscoveryResponse {
    bool success = 1;
    string message = 2;
}

message StreamRequest {
    string satellite_id = 1;
    oneof payload {
        bool init = 2; // Handshake
        JobStatusUpdate status_update = 3;
    }
}

message JobStatusUpdate {
    string job_id = 1;
    JobStatus status = 2;
    string message = 3; // logs or error message
    int32 exit_code = 4;
    map<string, string> trace_context = 5;
}

enum JobStatus {
    PENDING = 0;
    RUNNING = 1;
    COMPLETED = 2;
    FAILED = 3;
}

message StreamResponse {
    string command_id = 1;
    string command_type = 2; // e.g. "EXEC_SHELL"
    string payload = 3; // e.g. "echo Hello"
    map<string, string> trace_context = 4;
}
