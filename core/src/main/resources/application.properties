# Datasource - 使用环境变量，开发环境有默认值
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:lcm_user}
quarkus.datasource.password=${DB_PASSWORD:lcm_password}

# Reactive datasource for Hibernate Reactive
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://localhost:5432/lcm_db}
quarkus.datasource.reactive.max-size=100

# JDBC datasource for Flyway migrations only
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/lcm_db}

# Hibernate
# Disable auto-generation in base properties, let Flyway handle it. 
# Validation can be enabled in production profile.
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.clean-at-start=true

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS

# Timefold (OptaPlanner)
# Limit the solving time to 30 seconds for demo purposes
quarkus.timefold.solver.termination.spent-limit=30s

# HTTP
quarkus.http.port=8080
quarkus.http.access-log.enabled=true

# Health Check - use /health consistently across all profiles
quarkus.smallrye-health.root-path=/health

# ============================================
# OpenTelemetry (Distributed Tracing)
# ============================================
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=hyperscale-lcm-core
quarkus.otel.traces.enabled=true
quarkus.otel.propagators=tracecontext,baggage
# Disable OTel SDK in tests so the exporter does not spam
# "Connection refused: localhost:4317" warnings into Backend Tests logs.
%test.quarkus.otel.sdk.disabled=true

# AlertManager push integration
lcm.alertmanager.enabled=${LCM_ALERTMANAGER_ENABLED:false}
lcm.alertmanager.url=${LCM_ALERTMANAGER_URL:http://alertmanager:9093/api/v2/alerts}
lcm.alertmanager.connect-timeout-ms=${LCM_ALERTMANAGER_CONNECT_TIMEOUT_MS:3000}
lcm.alertmanager.request-timeout-ms=${LCM_ALERTMANAGER_REQUEST_TIMEOUT_MS:5000}

# Satellite image catalog aggregation
lcm.satellite.image-api.scheme=${LCM_SATELLITE_IMAGE_API_SCHEME:http}
lcm.satellite.image-api.port=${LCM_SATELLITE_IMAGE_API_PORT:8090}
lcm.satellite.image-api.path=${LCM_SATELLITE_IMAGE_API_PATH:/api/images}
lcm.satellite.image-api.connect-timeout-ms=${LCM_SATELLITE_IMAGE_API_CONNECT_TIMEOUT_MS:1000}
lcm.satellite.image-api.request-timeout-ms=${LCM_SATELLITE_IMAGE_API_REQUEST_TIMEOUT_MS:3000}
%test.lcm.satellite.image-api.port=18090

# JaCoCo runtime instrumentation should ignore generated gRPC/protobuf classes.
quarkus.jacoco.excludes=**/com/sc/lcm/core/grpc/**

# gRPC Configuration - 使用环境变量，支持相对路径
# use-separate-server=false: gRPC 与 HTTP 共享 Vert.x 服务器，使 Hibernate Reactive
# 的 Panache.withTransaction() 能在 gRPC handler 中正常获取事件循环上下文
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.ssl.certificate=${GRPC_CERT_PATH:./certs/server.pem}
quarkus.grpc.server.ssl.key=${GRPC_KEY_PATH:./certs/server-pkcs8.key}
quarkus.grpc.server.ssl.trust-store=${GRPC_TRUSTSTORE_PATH:./certs/truststore.jks}
quarkus.grpc.server.ssl.trust-store-password=${GRPC_TRUSTSTORE_PASSWORD:changeit}
quarkus.grpc.server.ssl.client-auth=required
quarkus.grpc.server.ssl.trust-store-type=jks

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Channels
# Outgoing: Scheduler -> JobQueue
mp.messaging.outgoing.job-queue-out.connector=smallrye-kafka
mp.messaging.outgoing.job-queue-out.topic=jobs.scheduled
mp.messaging.outgoing.job-queue-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.job-queue-out.merge=true

# Incoming: Dispatcher <- JobQueue
mp.messaging.incoming.job-queue-in.connector=smallrye-kafka
mp.messaging.incoming.job-queue-in.topic=jobs.scheduled
mp.messaging.incoming.job-queue-in.value.deserializer=com.sc.lcm.core.domain.JobDeserializer
mp.messaging.incoming.job-queue-in.group.id=lcm-core-group
mp.messaging.incoming.job-queue-in.auto.offset.reset=earliest

# Job Execution: Core -> Satellite (P6-1)
mp.messaging.outgoing.job-execution-out.connector=smallrye-kafka
mp.messaging.outgoing.job-execution-out.topic=jobs.execution
mp.messaging.outgoing.job-execution-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.job-execution-out.merge=true

# Job Status Callback: Satellite -> Core (P6-3)
mp.messaging.incoming.job-status-in.connector=smallrye-kafka
mp.messaging.incoming.job-status-in.topic=jobs.status
mp.messaging.incoming.job-status-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.job-status-in.group.id=lcm-core-status-group
mp.messaging.incoming.job-status-in.auto.offset.reset=earliest

# Outgoing: LcmGrpcService -> Job Status
mp.messaging.outgoing.job-status-out.connector=smallrye-kafka
mp.messaging.outgoing.job-status-out.topic=jobs.status
mp.messaging.outgoing.job-status-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Dead Letter Queue for Job Status Failures
mp.messaging.outgoing.job-status-dlq-out.connector=smallrye-kafka
mp.messaging.outgoing.job-status-dlq-out.topic=jobs.status.dlq
mp.messaging.outgoing.job-status-dlq-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer


# ============================================
# Fault Tolerance (Rate Limiting & Circuit Breaker)
# ============================================
# Rate Limiting: 2000 requests per second (for 10K nodes @ 5s heartbeat)
# This protects the Core from traffic spikes
# Note: SmallRye uses "RateLimit" annotation and config key
LcmGrpcService/sendHeartbeat/RateLimit/value=2000
LcmGrpcService/sendHeartbeat/RateLimit/window=1

# REST API role-based limits (per principal, sliding window)
lcm.api.rate-limit.window-seconds=60
lcm.api.rate-limit.user.requests=60
lcm.api.rate-limit.operator.requests=120
lcm.api.rate-limit.admin.requests=300

# Bulkhead: Max 200 concurrent heartbeat calls
LcmGrpcService/sendHeartbeat/Bulkhead/value=200

# Circuit Breaker: Open after 50% failures in 20 calls
LcmGrpcService/registerSatellite/CircuitBreaker/failureRatio=0.5
LcmGrpcService/registerSatellite/CircuitBreaker/requestVolumeThreshold=20
LcmGrpcService/registerSatellite/CircuitBreaker/delay=5000

# ============================================
# Security (JWT)
# ============================================
# JWT verification (disabled in dev mode for easier testing)
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:META-INF/resources/publicKey.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:https://lcm.example.com}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:META-INF/resources/privateKey.pem}

# Enable/disable security per profile
%dev.quarkus.security.auth.enabled-in-dev-mode=false
%dev.lcm.auth.dev-users.enabled=true
%test.lcm.auth.dev-users.enabled=true
%prod.quarkus.http.auth.permission.authenticated.paths=/api/*
%prod.quarkus.http.auth.permission.authenticated.policy=authenticated

# ============================================
# Discovery & Onboarding
# ============================================
lcm.discovery.require-approval=true
lcm.claim.secret-resolver.allow-env=true
lcm.claim.secret-resolver.allow-literal=false
lcm.claim.secret-resolver.allowed-env-prefixes=LCM_BMC_,BMC_
lcm.claim.vault.enabled=false
lcm.claim.vault.address=${LCM_VAULT_ADDR:}
# 生产环境须通过 LCM_VAULT_TOKEN 环境变量注入，禁止将明文 token 写入此文件
lcm.claim.vault.token=${LCM_VAULT_TOKEN:}
lcm.claim.vault.namespace=${LCM_VAULT_NAMESPACE:}
lcm.claim.vault.kv-engine-version=2
lcm.claim.vault.connect-timeout-ms=3000
lcm.claim.vault.read-timeout-ms=5000
lcm.claim.vault.cache-ttl-seconds=60
lcm.claim.redfish.connect-timeout-ms=5000
lcm.claim.redfish.read-timeout-ms=10000
# 开发/测试默认允许跳过 TLS 验证（BMC 通常使用自签名证书）；
# 生产环境强制关闭，需由运维在 BMC 侧部署受信任证书。
lcm.claim.redfish.insecure=true
lcm.claim.redfish.managed-account.default-role-id=Administrator
lcm.claim.redfish.managed-account.rotate-on-claim=true
lcm.cmdb.sync.enabled=false
lcm.cmdb.sync.url=
lcm.cmdb.sync.auth-header-name=Authorization
# 生产环境建议通过环境变量或 Secret Manager 注入，例如 "Bearer <token>"
lcm.cmdb.sync.auth-header-value=${LCM_CMDB_AUTH_HEADER_VALUE:}
lcm.cmdb.sync.payload-root=entries
lcm.cmdb.sync.source-type=CMDB
lcm.cmdb.sync.mapping-file=
lcm.cmdb.sync.max-pages=20
lcm.cmdb.sync.connect-timeout-ms=3000
lcm.cmdb.sync.read-timeout-ms=10000
lcm.cmdb.sync.schedule=0 */30 * * * ?
# BMC 托管账号定时轮换（默认关闭；生产环境按需开启并配置 cron）
lcm.rotation.enabled=false
lcm.rotation.schedule=0 0 2 * * ?
%prod.lcm.claim.redfish.insecure=false
lcm.redfish.template-catalog.dir=documentation/redfish-templates
%dev.lcm.claim.secret-resolver.allow-literal=true
%test.lcm.claim.secret-resolver.allow-literal=true

# ============================================
# Test Profile Overrides
# ============================================
%test.quarkus.grpc.server.ssl.certificate=
%test.quarkus.grpc.server.ssl.key=
%test.quarkus.grpc.server.ssl.trust-store=
%test.quarkus.grpc.server.ssl.trust-store-type=
%test.quarkus.grpc.server.ssl.trust-store-password=
%test.quarkus.grpc.server.ssl.client-auth=none
%test.quarkus.grpc.server.plain-text=true
%test.quarkus.grpc.clients.lcm.host=localhost
%test.quarkus.grpc.clients.lcm.port=8081
%test.quarkus.grpc.clients.lcm.plain-text=true
%test.lcm.discovery.require-approval=false

# ============================================
# Scheduling Engine Toggle
# ============================================
lcm.scheduling.partitioned.enabled=false
%test.lcm.scheduling.partitioned.enabled=true

# DevServices: Testcontainers-backed infrastructure for tests
# When no explicit service URL is provided, Quarkus automatically
# starts PostgreSQL, Kafka, and Redis containers via Testcontainers.
%test.quarkus.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.kafka.devservices.enabled=true
%test.quarkus.redis.devservices.enabled=true

# Reduce test log noise from library internals and synthetic alert scenarios.
%test.quarkus.log.category."ai.timefold.solver".level=ERROR
%test.quarkus.log.category."com.sc.lcm.core.service.AlertService".level=ERROR
