# ============================================
# Hyperscale LCM 生产环境配置
# ============================================
# 激活方式: -Dquarkus.profile=prod
# 或设置环境变量: QUARKUS_PROFILE=prod

# ============================================
# 安全配置
# ============================================
# 禁用 SQL 日志（避免敏感数据泄露）
quarkus.hibernate-orm.log.sql=false

# 生产环境 CORS 配置（必须设置实际域名）
quarkus.http.cors.origins=${ALLOWED_ORIGINS}

# 禁用开发工具
quarkus.swagger-ui.always-include=false
quarkus.dev-ui.enabled=false

# ============================================
# HTTP/SSL 配置
# ============================================
# 强制 HTTPS
quarkus.http.insecure-requests=redirect

# SSL 证书（生产环境必须配置）
quarkus.http.ssl.certificate.files=${HTTP_CERT_PATH}
quarkus.http.ssl.certificate.key-files=${HTTP_KEY_PATH}

# ============================================
# 访问日志配置
# ============================================
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b %D

# ============================================
# 性能优化
# ============================================
# 增加连接池大小
quarkus.datasource.jdbc.max-size=200
quarkus.datasource.jdbc.min-size=50

# Timefold 求解时间（生产环境可加长）
quarkus.timefold.solver.termination.spent-limit=60s

# ============================================
# 健康检查配置
# ============================================
quarkus.smallrye-health.root-path=/health
quarkus.health.extensions.enabled=true
