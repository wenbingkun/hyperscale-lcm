name: "CodeQL"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main", "develop" ]
  schedule:
    - cron: '30 1 * * 0' # Weekly scan on Sunday

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'java', 'javascript' ]
        # CodeQL supports [ 'c-cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate dummy keys
      run: chmod +x scripts/generate_keys.sh && ./scripts/generate_keys.sh

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Set up JDK 21
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Go
      if: matrix.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.0'

    - name: Grant execute permission for gradlew
      if: matrix.language == 'java'
      run: chmod +x core/gradlew

    # Java is built explicitly (instead of via codeql-action/autobuild) so we
    # can benefit from the Gradle dependency cache provided by setup-java and
    # retry on transient Maven Central errors (e.g. 403/5xx). A single 4xx
    # used to red the entire workflow — see #13.
    - name: Build Java for CodeQL
      if: matrix.language == 'java'
      working-directory: core
      run: |
        set -euo pipefail
        attempts=3
        for i in $(seq 1 $attempts); do
          if ./gradlew --no-daemon assemble -x test --console=plain; then
            exit 0
          fi
          if [ "$i" -lt "$attempts" ]; then
            echo "::warning::Gradle build attempt $i failed, retrying in 15s..."
            sleep 15
          fi
        done
        echo "::error::Gradle build failed after $attempts attempts"
        exit 1

    # Autobuild handles Go and JavaScript fine; only Java needed the
    # explicit + cached + retried path above.
    - name: Autobuild
      if: matrix.language != 'java'
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
