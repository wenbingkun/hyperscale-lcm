name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  GO_VERSION: '1.24.0'
  NODE_VERSION: '20'

jobs:
  # ==================== Backend Tests ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lcm
          POSTGRES_PASSWORD: lcm_password
          POSTGRES_DB: lcm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_NODE_ID: 1
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x core/gradlew
        
      - name: Generate dummy keys
        run: chmod +x scripts/generate_keys.sh && ./scripts/generate_keys.sh
        
      - name: Run tests with coverage verification
        working-directory: core
        run: ./gradlew check --no-daemon
        env:
          QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://localhost:5432/lcm
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/lcm
          QUARKUS_DATASOURCE_USERNAME: lcm
          QUARKUS_DATASOURCE_PASSWORD: lcm_password
          QUARKUS_REDIS_HOSTS: redis://localhost:6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload test and coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            core/build/reports/tests/
            core/build/reports/jacoco/

  # ==================== Frontend Build ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build
        working-directory: frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==================== Satellite Build ====================
  satellite-build:
    name: Satellite Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: satellite/go.sum
          
      - name: Generate dummy keys
        run: chmod +x scripts/generate_keys.sh && ./scripts/generate_keys.sh
      
      - name: Build
        working-directory: satellite
        run: go build -v ./cmd/satellite
      
      - name: Run tests
        working-directory: satellite
        run: go test -v ./...

  # ==================== Backend Load Test ====================
  load-test:
    name: Core Load Test
    runs-on: ubuntu-latest
    needs: [backend-test, satellite-build]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lcm
          POSTGRES_PASSWORD: lcm_password
          POSTGRES_DB: lcm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_NODE_ID: 1
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: satellite/go.sum
          
      - name: Grant execute permission for gradlew
        run: chmod +x core/gradlew
        
      - name: Generate dummy TLS keys
        run: chmod +x scripts/generate_keys.sh && ./scripts/generate_keys.sh
        
      - name: Build Core (Fast-JAR)
        working-directory: core
        run: ./gradlew build -Dquarkus.package.type=fast-jar -x test

      - name: Build LoadGen tool
        working-directory: satellite
        run: go build -o loadgen ./cmd/loadgen

      - name: Start Core Server Background
        working-directory: core
        env:
          QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://localhost:5432/lcm
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/lcm
          QUARKUS_DATASOURCE_USERNAME: lcm
          QUARKUS_DATASOURCE_PASSWORD: lcm_password
          QUARKUS_REDIS_HOSTS: redis://localhost:6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          java -jar build/quarkus-app/quarkus-run.jar &
          # Wait for Core HTTP health endpoint (port 8080) to become ready
          timeout 60 bash -c 'until curl -sf http://localhost:8080/q/health/ready; do sleep 2; done'

      - name: Execute Load Profile (500 satellites for 30s)
        working-directory: satellite
        run: |
          ./loadgen -addr localhost:9000 -conns 10 -sats 50 -interval 1s -duration 30s -cert ../certs/client.pem -key ../certs/client.key -ca ../certs/ca.pem 2>&1 | tee /tmp/loadgen.log

      - name: Validate Load Test Baseline
        run: |
          summary_line=$(grep 'LOADGEN_SUMMARY ' /tmp/loadgen.log | tail -n 1)
          if [ -z "$summary_line" ]; then
            echo "Missing LOADGEN_SUMMARY output"
            exit 1
          fi

          summary_json=${summary_line#*LOADGEN_SUMMARY }

          python3 - <<'PY' "$summary_json"
          import json
          import sys

          summary = json.loads(sys.argv[1])

          registration_success = summary["registrationSuccess"]
          total_satellites = summary["totalSatellites"]
          registration_rate = summary["registrationSuccessRate"]
          heartbeat_attempts = summary["heartbeatAttempts"]
          heartbeat_failures = summary["heartbeatFailures"]
          heartbeat_rate = summary["heartbeatSuccessRate"]

          errors = []
          if registration_success < int(total_satellites * 0.95):
              errors.append(
                  f"registration baseline failed: {registration_success}/{total_satellites} satellites registered"
              )
          if registration_rate < 0.95:
              errors.append(f"registration success rate too low: {registration_rate:.3f}")
          if heartbeat_attempts < total_satellites:
              errors.append(
                  f"heartbeat baseline failed: only {heartbeat_attempts} heartbeat attempts for {total_satellites} satellites"
              )
          if heartbeat_rate < 0.99:
              errors.append(f"heartbeat success rate too low: {heartbeat_rate:.3f}")
          if heartbeat_failures > max(5, int(heartbeat_attempts * 0.01)):
              errors.append(
                  f"heartbeat failures above threshold: {heartbeat_failures}/{heartbeat_attempts}"
              )

          if errors:
              for error in errors:
                  print(error)
              sys.exit(1)

          print(
              "Load test baseline passed:",
              json.dumps(
                  {
                      "registrationSuccess": registration_success,
                      "totalSatellites": total_satellites,
                      "heartbeatAttempts": heartbeat_attempts,
                      "heartbeatFailures": heartbeat_failures,
                      "heartbeatSuccessRate": heartbeat_rate,
                  }
              ),
          )
          PY
          
      - name: Verify Core Health Post-Load
        run: |
          # Fail the step if Core crashed or is unhealthy after load test
          curl -sf http://localhost:8080/q/health/live

  # ==================== Docker Images ====================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, satellite-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Core image
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Satellite image
        uses: docker/build-push-action@v5
        with:
          context: ./satellite
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-satellite:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-satellite:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
