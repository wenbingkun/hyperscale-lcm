name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # ==================== Backend Tests ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lcm
          POSTGRES_PASSWORD: lcm_password
          POSTGRES_DB: lcm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x core/gradlew
        
      - name: Run tests
        working-directory: core
        run: ./gradlew test --no-daemon
        env:
          QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://localhost:5432/lcm
          QUARKUS_DATASOURCE_USERNAME: lcm
          QUARKUS_DATASOURCE_PASSWORD: lcm_password
          QUARKUS_REDIS_HOSTS: redis://localhost:6379
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: core/build/reports/tests/

  # ==================== Frontend Build ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build
        working-directory: frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==================== Satellite Build ====================
  satellite-build:
    name: Satellite Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: satellite/go.sum
      
      - name: Build
        working-directory: satellite
        run: go build -v ./cmd/satellite
      
      - name: Run tests
        working-directory: satellite
        run: go test -v ./...

  # ==================== Docker Images ====================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, satellite-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Core image
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Satellite image
        uses: docker/build-push-action@v5
        with:
          context: ./satellite
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-satellite:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lcm-satellite:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
