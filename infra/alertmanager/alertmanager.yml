# ============================================================================
# Dev-local Alertmanager configuration.
# Matches the Helm chart route tree structure (see files/alertmanager.yml.tpl).
# All receivers are empty (no real secrets in dev); alerts will be accepted
# and visible via API but silently dropped by empty receiver blocks.
# ============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by:
    - alertname
    - job
    - severity
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical-receiver
      continue: false
    - matchers:
        - severity="warning"
      receiver: warning-receiver
      continue: false

receivers:
  - name: default-receiver

  - name: critical-receiver
    # In dev, no real notification channels are configured.
    # Enable receivers via Helm values in production deployments.

  - name: warning-receiver
    # In dev, no real notification channels are configured.
    # Enable receivers via Helm values in production deployments.
