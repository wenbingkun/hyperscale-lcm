# ============================================================================
# IMPORTANT: This is a TEMPLATE configuration. Before deploying to production,
# you MUST replace ALL placeholder values (CHANGE_ME, REPLACE_ME, example.com)
# with real credentials. Deploying with placeholders will cause silent alert
# delivery failures.
# ============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by:
    - alertname
    - job
    - severity
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default-receiver

  # Email placeholder. Replace with real SMTP settings before enabling.
  - name: email-placeholder
    email_configs:
      - to: alerts@example.com
        from: alertmanager@example.com
        smarthost: smtp.example.com:587
        auth_username: alertmanager@example.com
        auth_password: CHANGE_ME
        require_tls: true

  # Slack placeholder. Replace with a real incoming webhook URL before enabling.
  - name: slack-placeholder
    slack_configs:
      - api_url: https://hooks.slack.com/services/REPLACE/ME
        channel: '#alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # PagerDuty placeholder. Replace with a real routing key before enabling.
  - name: pagerduty-placeholder
    pagerduty_configs:
      - routing_key: REPLACE_ME
        severity: '{{ .CommonLabels.severity | default "warning" }}'
