global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'quarkus-core'
    metrics_path: /q/metrics/prometheus
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
