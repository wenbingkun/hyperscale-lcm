apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hyperscale-lcm-satellite
  labels:
    app: hyperscale-lcm
    component: satellite
spec:
  selector:
    matchLabels:
      app: hyperscale-lcm
      component: satellite
  template:
    metadata:
      labels:
        app: hyperscale-lcm
        component: satellite
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: satellite
          image: example/lcm-satellite:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CORE_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: hyperscale-lcm-config
                  key: core-grpc-address
            - name: CERT_DIR
              value: "/app/certs"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            privileged: false
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: certs
              mountPath: /app/certs
              readOnly: true
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: hyperscale-lcm-tls
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
      tolerations:
        - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
