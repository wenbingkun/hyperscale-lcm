# ⚠️ 警告: 此文件包含敏感信息示例
# 生产环境请使用 Kubernetes Secrets 或外部密钥管理服务 (Vault/AWS Secrets Manager)
# 不要将真实密钥提交到版本控制系统

apiVersion: v1
kind: Secret
metadata:
  name: hyperscale-lcm-secrets
  labels:
    app: hyperscale-lcm
type: Opaque
stringData:
  # 数据库连接
  db-reactive-url: "postgresql://postgres-master.default.svc.cluster.local:5432/lcm_db"
  db-jdbc-url: "jdbc:postgresql://postgres-master.default.svc.cluster.local:5432/lcm_db"
  db-username: "lcm_user"
  db-password: "CHANGE_ME_IN_PRODUCTION"
  
  # gRPC TLS truststore
  grpc-truststore-password: "changeit"
---
# TLS secret - Do NOT apply this directly.
# Create the TLS secret using kubectl instead:
#   kubectl create secret tls hyperscale-lcm-tls \
#     --cert=server.pem --key=server.key \
#     -n <namespace>
#
# Or use cert-manager to auto-provision certificates.
